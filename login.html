<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientMgr — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1321;
      --bg2:     #111827;
      --bg3:     #1a2540;
      --accent:  #38bdf8;
      --accent2: #0284c7;
      --text:    #e0f2fe;
      --text2:   #7da8c4;
      --text3:   #3d6480;
      --border:  #1e3a52;
      --danger:  #f87171;
    }

    html, body {
      height: 100%;
      font-size: 20px; /* match main app base size */
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 22rem;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .login-logo span { color: var(--text3); font-weight: 400; }

    .login-tagline {
      font-size: 0.7rem;
      color: var(--text3);
      text-align: center;
      font-family: 'DM Mono', monospace;
      margin-bottom: 2rem;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 1.75rem 1.75rem 1.5rem;
    }

    .login-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 0.875rem; }

    .field label {
      display: block;
      font-size: 0.65rem;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.375rem;
    }

    .field-wrap { position: relative; }

    .field-wrap i {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 0.3rem;
      padding: 0.6rem 0.75rem 0.6rem 2.25rem;
      font-size: 0.85rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input::placeholder { color: var(--text3); }
    .field input:focus        { border-color: var(--accent2); }

    .login-btn {
      width: 100%;
      background: var(--accent2);
      border: none;
      color: #e0f2fe;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.7rem;
      border-radius: 0.3rem;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: all 0.15s;
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover  { background: var(--accent); color: var(--bg); }
    .login-btn:active { transform: scale(0.98); }

    .error-msg {
      font-size: 0.7rem;
      color: var(--danger);
      font-family: 'DM Mono', monospace;
      margin-top: 0.75rem;
      min-height: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.375rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.visible { opacity: 1; }

    .login-footer {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-top: 1.25rem;
      line-height: 2;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-logo">CLIENT<span>mgr</span></div>
    <div class="login-tagline">internal tool</div>

    <div class="login-card">
      <div class="login-title">Sign in</div>

      <div class="field">
        <label for="email">Email</label>
        <div class="field-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" id="email" placeholder="Enter email" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="field-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
        </div>
      </div>

      <button class="login-btn" id="login-btn">
        <i class="ti ti-login"></i> Sign in
      </button>

      <div class="error-msg" id="error-msg">
        <i class="ti ti-alert-circle"></i>
        <span id="error-text">Invalid email or password.</span>
      </div>
    </div>

    <div class="login-footer">
      clientmgr &mdash; internal use only<br/>
      <a href="signup.html" style="color:var(--text3);text-decoration:none;font-size:10px;opacity:0.6;transition:opacity 0.15s"
         onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">
        Request access
      </a>
    </div>
  </div>

  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBJii3XONCMHHDpm9TrqYwHKZ4rJSEb_CI",
      authDomain:        "clientmgr-b66ae.firebaseapp.com",
      projectId:         "clientmgr-b66ae",
      storageBucket:     "clientmgr-b66ae.firebasestorage.app",
      messagingSenderId: "416134439201",
      appId:             "1:416134439201:web:a2482a79088e9ee0d5de60"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // If already logged in, check status before redirecting
    onAuthStateChanged(auth, async user => {
      if (user) {
        const status = await getUserStatus(user.uid);
        if (status === 'approved' || status === null) {
          window.location.href = '/';
        }
        // pending/rejected stay on login page — handled in attemptLogin
      }
    });

    async function getUserStatus(uid) {
      try {
        const snap = await getDoc(doc(db, 'users', uid));
        return snap.exists() ? (snap.data().status || null) : null;
      } catch {
        return null;
      }
    }

    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn      = document.getElementById('login-btn');
    const errorMsg      = document.getElementById('error-msg');
    const errorText     = document.getElementById('error-text');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 5000);
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.innerHTML = loading
        ? '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Signing in...'
        : '<i class="ti ti-login"></i> Sign in';
    }

    async function attemptLogin() {
      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        const cred   = await signInWithEmailAndPassword(auth, email, password);
        const status = await getUserStatus(cred.user.uid);

        if (status === 'pending') {
          await signOut(auth);
          setLoading(false);
          showError('Your account is pending approval by an admin.');
          return;
        }

        if (status === 'rejected') {
          await signOut(auth);
          setLoading(false);
          showError('Your access request was not approved.');
          return;
        }

        // approved or no status (admin-created accounts) — redirect
        window.location.href = '/';

      } catch (err) {
        setLoading(false);
        passwordInput.value = '';
        passwordInput.focus();

        switch (err.code) {
          case 'auth/user-not-found':
          case 'auth/wrong-password':
          case 'auth/invalid-credential':
            showError('Invalid email or password.');
            break;
          case 'auth/too-many-requests':
            showError('Too many attempts. Try again later.');
            break;
          case 'auth/invalid-email':
            showError('Please enter a valid email address.');
            break;
          default:
            showError('Something went wrong. Please try again.');
        }
      }
    }

    loginBtn.addEventListener('click', attemptLogin);

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') attemptLogin();
      });
    });

    emailInput.focus();
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

</body>
</html>
